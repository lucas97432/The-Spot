<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#050505"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>THE SPOT — Pre-Launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════════════
   THE SPOT — PRE-LAUNCH EXPERIENCE
   Stealth Dark · Emerald · Gold · Full SPA
════════════════════════════════════════════════════ */
:root {
  --bg:    #050505;
  --bg1:   #0A0A0A;
  --bg2:   #111111;
  --bg3:   #1A1A1A;
  --bg4:   #242424;
  --em:    #00FFA3;   /* Emerald - Riders */
  --em2:   #00CC82;
  --em3:   #00FF6A;
  --gold:  #FFD700;   /* Gold - Founders */
  --gold2: #FFA500;
  --gold3: #FFE55C;
  --text:  #F0F0F0;
  --text2: #888888;
  --text3: #444444;
  --red:   #FF4444;
  --r:     18px;
  --st:    env(safe-area-inset-top, 0px);
  --sb:    env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; overscroll-behavior: none; }
::-webkit-scrollbar { display: none; }
button, input, textarea { font-family: 'DM Sans', sans-serif; outline: none; }

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/%3E%3C/svg%3E");
  opacity: .6; mix-blend-mode: overlay;
}

/* ── TACTICAL MAP BG ── */
#mapBg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: radial-gradient(ellipse 120% 80% at 50% 50%, #0D1F14 0%, #050505 70%);
}
#mapBg::before {
  content: '';
  position: absolute; inset: -20%;
  background-image:
    linear-gradient(rgba(0,255,163,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,163,.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: mapDrift 30s linear infinite;
}
#mapBg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle 300px at 20% 30%, rgba(0,255,163,.06) 0%, transparent 70%),
    radial-gradient(circle 400px at 80% 70%, rgba(255,215,0,.04) 0%, transparent 70%),
    radial-gradient(circle 200px at 60% 20%, rgba(0,255,163,.04) 0%, transparent 60%);
  animation: ambientPulse 8s ease-in-out infinite alternate;
}
@keyframes mapDrift { to { transform: translate(60px, 60px); } }
@keyframes ambientPulse {
  from { opacity: .6; }
  to   { opacity: 1; }
}

/* Map dots */
.map-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--em);
  box-shadow: 0 0 8px var(--em), 0 0 20px rgba(0,255,163,.3);
  animation: dotPulse 3s ease-in-out infinite;
}
.map-dot::after {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(0,255,163,.3);
  animation: dotRing 3s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.3); opacity: .7; }
}
@keyframes dotRing {
  0%   { transform: scale(1); opacity: .6; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* ── ROOT ── */
#root {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* ── SCREENS ── */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto; overflow-x: hidden;
  padding: calc(var(--st) + 20px) 20px calc(var(--sb) + 24px);
  opacity: 0; pointer-events: none;
  transition: opacity .5s ease, transform .5s cubic-bezier(.25,.46,.45,.94);
  transform: translateY(20px);
}
.screen.active {
  opacity: 1; pointer-events: all; transform: translateY(0);
}
.screen.exit-up   { opacity: 0; transform: translateY(-30px); }
.screen.exit-down { opacity: 0; transform: translateY(30px); }

/* ── LOGO ── */
.logo-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; margin-bottom: 32px;
}
.logo-img {
  width: 72px; height: 72px;
  border-radius: 20px;
  object-fit: contain;
  box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 8px 32px rgba(0,0,0,.6);
  animation: logoPop .8s cubic-bezier(.34,1.56,.64,1);
}
@keyframes logoPop {
  from { opacity: 0; transform: scale(.6); }
  to   { opacity: 1; transform: scale(1); }
}
.logo-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  letter-spacing: .12em; text-transform: uppercase;
  background: linear-gradient(135deg, #fff 0%, #888 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .4em; text-transform: uppercase;
  color: var(--text3);
}

/* ── GLASS CARD ── */
.card {
  width: 100%; max-width: 400px;
  background: rgba(10,10,10,.85);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 24px; padding: 28px 24px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.02), 0 32px 80px rgba(0,0,0,.8);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
}

/* ── TABS ── */
.tabs {
  display: flex; background: rgba(255,255,255,.04);
  border-radius: 14px; padding: 4px; gap: 4px; margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 11px; border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text3); background: transparent; cursor: pointer; transition: all .25s;
}
.tab.on {
  background: rgba(255,255,255,.07);
  color: var(--text);
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset;
}

/* ── INPUTS ── */
.field { margin-bottom: 14px; }
.lbl {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 8px;
}
.inp {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px; padding: 13px 16px;
  color: var(--text); font-size: 15px;
  transition: border-color .2s, box-shadow .2s;
}
.inp:focus { border-color: rgba(0,255,163,.3); box-shadow: 0 0 0 3px rgba(0,255,163,.06); }
.inp::placeholder { color: var(--text3); }
.inp.err { border-color: rgba(255,68,68,.4); box-shadow: 0 0 0 3px rgba(255,68,68,.06); }
.inp.ok  { border-color: rgba(0,255,163,.4); }

.inp-wrap { position: relative; }
.inp-wrap .inp { padding-right: 48px; }
.eye-btn {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; font-size: 17px; color: var(--text3);
  cursor: pointer; padding: 4px; transition: color .2s; line-height: 1;
}
.eye-btn:hover { color: var(--text); }

/* pseudo status */
.pseudo-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; margin-top: 5px;
  height: 14px; transition: all .2s;
}
.pseudo-status.ok  { color: var(--em); }
.pseudo-status.err { color: var(--red); }

/* referral hint */
.ref-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; margin-top: 5px; height: 14px;
}
.ref-hint.ok  { color: var(--em); }
.ref-hint.err { color: var(--red); }

/* ── BUTTONS ── */
.btn-em {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #00CC82, #00FFA3, #00FF6A);
  background-size: 200% 200%; animation: btnShimmer 3s ease infinite;
  color: #050505; font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 24px rgba(0,255,163,.25), 0 0 0 1px rgba(0,255,163,.15);
}
.btn-em:active { transform: scale(.97); }
.btn-em:disabled { opacity: .4; cursor: not-allowed; transform: none; }
@keyframes btnShimmer { 0%{background-position:0 50%} 50%{background-position:100% 50%} 100%{background-position:0 50%} }

.btn-gold {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #B8860B, #FFD700, #FFE55C);
  background-size: 200% 200%; animation: btnShimmer 3s ease infinite;
  color: #050505; font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 24px rgba(255,215,0,.25), 0 0 0 1px rgba(255,215,0,.15);
}
.btn-gold:active { transform: scale(.97); }

.btn-ghost {
  width: 100%; padding: 13px; border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-ghost:hover { border-color: rgba(255,255,255,.15); color: var(--text); }

.btn-share {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px; border-radius: 14px;
  border: 1px solid rgba(0,255,163,.2);
  background: rgba(0,255,163,.05);
  color: var(--em); font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.btn-share:hover { background: rgba(0,255,163,.1); border-color: rgba(0,255,163,.35); }
.btn-share:active { transform: scale(.97); }

/* ── OTP ── */
.otp-row {
  display: flex; gap: 8px; justify-content: center; margin: 4px 0 8px;
}
.otp-digit {
  width: 46px; height: 56px;
  background: rgba(255,255,255,.04);
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 14px;
  text-align: center; font-size: 22px; font-weight: 700;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  transition: all .2s; caret-color: var(--em);
}
.otp-digit:focus {
  border-color: rgba(0,255,163,.5);
  box-shadow: 0 0 0 3px rgba(0,255,163,.08);
  background: rgba(0,255,163,.04);
}
.otp-digit.filled { border-color: rgba(0,255,163,.3); color: var(--em); }
.otp-digit.shake  { animation: shake .4s cubic-bezier(.36,.07,.19,.97); }
@keyframes shake {
  10%,90%  { transform: translateX(-2px); }
  20%,80%  { transform: translateX(4px); }
  30%,50%,70% { transform: translateX(-4px); }
  40%,60%  { transform: translateX(4px); }
}
.otp-email-hint {
  text-align: center; font-size: 13px; color: var(--text2);
  margin-bottom: 16px; line-height: 1.5;
}
.otp-email-hint strong { color: var(--em); }

/* ── DIVIDER ── */
.divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,.05); }
.divider-txt { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ══════════════════════════════════
   DASHBOARD SCREEN
══════════════════════════════════ */
#sDash { justify-content: flex-start; padding-top: calc(var(--st) + 16px); }

.dash-header {
  width: 100%; max-width: 400px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px; margin-bottom: 20px;
}
.dash-logo-sm {
  width: 40px; height: 40px; border-radius: 12px;
  object-fit: contain;
  box-shadow: 0 0 0 1px rgba(255,255,255,.06);
}
.dash-greeting {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .15em; color: var(--text3);
}
.dash-pseudo-sm {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-top: 1px;
}

/* ── FOUNDER / RIDER BADGE ── */
.role-badge-wrap {
  width: 100%; max-width: 400px; display: flex; justify-content: center;
  margin-bottom: 16px;
}
.role-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
}
.role-badge.founder {
  background: rgba(255,215,0,.08);
  border: 1px solid rgba(255,215,0,.25);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(255,215,0,.1);
  animation: founderGlow 2.5s ease-in-out infinite;
}
.role-badge.rider {
  background: rgba(0,255,163,.06);
  border: 1px solid rgba(0,255,163,.2);
  color: var(--em);
}
.role-badge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  animation: dotPulse 2s ease-in-out infinite;
}
.role-badge.founder .role-badge-dot { background: var(--gold); }
.role-badge.rider   .role-badge-dot { background: var(--em); }
@keyframes founderGlow {
  0%,100% { box-shadow: 0 0 20px rgba(255,215,0,.1); }
  50%      { box-shadow: 0 0 40px rgba(255,215,0,.25), 0 0 80px rgba(255,215,0,.08); }
}
/* ── RIDER NUMBER ── */
.rider-block {
  width: 100%; max-width: 400px;
  text-align: center; margin-bottom: 20px;
}
.rider-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .35em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 4px;
}
.rider-number {
  font-family: 'Syne', sans-serif;
  font-size: 72px; font-weight: 800;
  line-height: 1; letter-spacing: -.02em;
  animation: riderReveal .8s cubic-bezier(.25,.46,.45,.94);
}
.rider-number.founder-num {
  background: linear-gradient(135deg, #B8860B 0%, #FFD700 40%, #FFE55C 70%, #FFD700 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 24px rgba(255,215,0,.3));
}
.rider-number.rider-num {
  background: linear-gradient(135deg, #00CC82 0%, #00FFA3 50%, #00FF6A 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 20px rgba(0,255,163,.25));
}
@keyframes riderReveal {
  from { opacity: 0; transform: scale(1.2); filter: blur(12px); }
  to   { opacity: 1; transform: scale(1); filter: none; }
}

.early-access-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 8px;
  background: rgba(255,215,0,.07);
  border: 1px solid rgba(255,215,0,.2);
  border-radius: 100px; padding: 4px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold2);
}

/* ── TIMER ── */
.timer-card {
  width: 100%; max-width: 400px;
  background: rgba(10,10,10,.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 20px; padding: 20px 16px 16px;
  margin-bottom: 16px; text-align: center; position: relative; overflow: hidden;
}
.timer-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,163,.2), transparent);
}
.timer-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
}
.timer-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.timer-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.timer-val {
  font-family: 'Syne', sans-serif;
  font-size: 36px; font-weight: 800; line-height: 1;
  color: var(--text);
  background: rgba(255,255,255,.04);
  border-radius: 12px; padding: 8px 4px; width: 100%;
  text-align: center;
  transition: transform .15s;
}
.timer-val.tick { animation: timerTick .2s ease; }
@keyframes timerTick {
  0%  { transform: translateY(-4px); opacity: .6; }
  100%{ transform: translateY(0);    opacity: 1; }
}
.timer-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text3);
}
.timer-sep { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text3); line-height: 1; align-self: center; padding-bottom: 16px; }

.wave-note {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: .06em; color: var(--text3);
}
.wave-note.warn { color: rgba(255,165,0,.7); }

/* ── PROGRESS BAR ── */
.progress-card {
  width: 100%; max-width: 400px;
  background: rgba(10,10,10,.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 20px; padding: 18px 20px;
  margin-bottom: 16px;
}
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--text3);
}
.progress-count {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--gold);
}
.progress-track {
  height: 6px; background: rgba(255,255,255,.05);
  border-radius: 100px; overflow: hidden; margin-bottom: 8px;
}
.progress-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--gold2), var(--gold), var(--gold3));
  transition: width 1.5s cubic-bezier(.25,.46,.45,.94);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 12px; border-radius: 100px;
  background: rgba(255,255,255,.6);
  animation: progGlow 1.5s ease-in-out infinite alternate;
}
@keyframes progGlow { from { opacity: .4; } to { opacity: 1; box-shadow: 0 0 8px var(--gold3); } }
.progress-sub {
  font-size: 11px; color: var(--text3);
  display: flex; justify-content: space-between;
}
.progress-sub span { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
.progress-sub .urgent { color: var(--red); font-weight: 700; }

/* ── SHARE BTN ── */
.dash-actions { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

/* ── BOTTOM LOGOUT ── */
.dash-footer {
  width: 100%; max-width: 400px;
  display: flex; justify-content: center;
  padding-bottom: 8px;
}
.logout-btn {
  background: none; border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); cursor: pointer;
  padding: 10px 20px; border-radius: 100px;
  transition: color .2s;
}
.logout-btn:hover { color: var(--red); }

/* ── TOAST ── */
#toasts {
  position: fixed; top: calc(var(--st) + 16px); left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 9990; pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 8px;
  background: rgba(10,10,10,.96); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 100px; padding: 10px 20px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  max-width: 88vw; box-shadow: 0 8px 32px rgba(0,0,0,.7);
  animation: tIn .4s cubic-bezier(.34,1.56,.64,1); pointer-events: auto;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.toast.s { border-color: rgba(0,255,163,.25); box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 12px rgba(0,255,163,.08); }
.toast.e { border-color: rgba(255,68,68,.25); }
.toast.g { border-color: rgba(255,215,0,.3); box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 14px rgba(255,215,0,.08); }
.toast.out { animation: tOut .3s ease forwards; }
@keyframes tIn  { from { opacity: 0; transform: translateY(-12px) scale(.84); } to { opacity: 1; transform: none; } }
@keyframes tOut { to   { opacity: 0; transform: translateY(-8px) scale(.9); } }

/* ── MISC ── */
.hide { display: none !important; }
.err-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--red); margin-top: 6px;
  display: none;
}
.err-msg.show { display: block; }

/* BACK BTN */
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--text3);
  font-size: 13px; cursor: pointer; padding: 8px 0;
  margin-bottom: 8px; align-self: flex-start;
  width: 100%; max-width: 400px;
  transition: color .2s;
}
.back-btn:hover { color: var(--text); }

/* LOADING SPINNER */
.spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(5,5,5,.3);
  border-top-color: #050505;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* mobile safe bottom */
.screen > *:last-child { margin-bottom: 0; }
</style>

const LOGO_FALLBACK = `data:image/svg+xml,${encodeURIComponent(`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FF6B35"/><stop offset="50%" style="stop-color:#E83E4A"/><stop offset="100%" style="stop-color:#9B59B6"/></linearGradient></defs><rect width="100" height="100" rx="22" fill="url(#g)"/><text x="50" y="64" font-size="48" text-anchor="middle" fill="white" font-weight="900">TS</text></svg>`)}`;

/* ── STATE ── */
let S = {
  user: null, profile: null,
  rank: null, isFounder: false,
  launchDate: null, timerInterval: null,
  pendingEmail: null, pendingPseudo: null, pendingRefId: null,
  pseudoOk: false, refOk: false,
  founderCount: 0,
};

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded', async () => {
  loadLogos();
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    S.user = session.user;
    await loadDashboard();
  }
});

db.auth.onAuthStateChange(async (e, session) => {
  if (e === 'SIGNED_IN' && session && !S.user) {
    S.user = session.user;
    await loadDashboard();
  }
});

function loadLogos() {
  // Try to load the actual logo; fallback to SVG
  ['logoLogin','logoOtp','logoDash'].forEach(id => {
    const el = document.getElementById(id);
    el.onerror = () => { el.src = LOGO_FALLBACK; };
    el.src = LOGO_FALLBACK; // Use fallback since the file isn't hosted yet
  });
}

/* ── SCREENS ── */
let currentScreen = 'sLogin';

function showScreen(id) {
  const prev = document.getElementById(currentScreen);
  const next = document.getElementById(id);
  if (!prev || !next || id === currentScreen) return;

  prev.classList.add('exit-up');
  setTimeout(() => {
    prev.classList.remove('active', 'exit-up');
  }, 500);

  next.style.transform = 'translateY(20px)';
  next.style.opacity = '0';
  setTimeout(() => {
    next.classList.add('active');
  }, 100);

  currentScreen = id;
}

function goBack() {
  if (currentScreen === 'sOtp') showScreen('sLogin');
}

/* ── AUTH TABS ── */
function switchTab(t) {
  document.getElementById('fLogin').classList.toggle('hide', t !== 'login');
  document.getElementById('fReg').classList.toggle('hide', t !== 'register');
  document.getElementById('tLogin').classList.toggle('on', t === 'login');
  document.getElementById('tReg').classList.toggle('on', t === 'register');
}

function toggleEye(fid, btn) {
  const f = document.getElementById(fid);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🙈';
}

/* ── PSEUDO CHECK (realtime) ── */
let pseudoTimer = null;
async function checkPseudo(val) {
  const el = document.getElementById('pseudoStatus');
  const inp = document.getElementById('rPseudo');
  S.pseudoOk = false;

  if (!val || val.length < 3) {
    el.textContent = val.length > 0 ? '⚠ Min. 3 caractères' : '';
    el.className = 'pseudo-status err';
    inp.className = 'inp';
    return;
  }

  el.textContent = '⟳ Vérification…';
  el.className = 'pseudo-status';
  clearTimeout(pseudoTimer);

  pseudoTimer = setTimeout(async () => {
    const { data } = await db.from('profiles')
      .select('id')
      .eq('username', val)
      .maybeSingle();

    if (data) {
      el.textContent = '✕ Ce pseudo est déjà pris';
      el.className = 'pseudo-status err';
      inp.className = 'inp err';
      S.pseudoOk = false;
    } else {
      el.textContent = '✓ Pseudo disponible';
      el.className = 'pseudo-status ok';
      inp.className = 'inp ok';
      S.pseudoOk = true;
    }
  }, 600);
}

/* ── REFERRAL CHECK (realtime) ── */
let refTimer = null;
async function checkRef(val) {
  const el = document.getElementById('refHint');
  const inp = document.getElementById('rRef');
  S.refOk = false; S.pendingRefId = null;

  if (!val) { el.textContent = ''; inp.className = 'inp'; return; }

  el.textContent = '⟳ Vérification…';
  el.className = 'ref-hint';
  clearTimeout(refTimer);

  refTimer = setTimeout(async () => {
    // Check in profiles table referral_code column
    const { data } = await db.from('profiles')
      .select('id, username')
      .eq('referral_code', val.toUpperCase())
      .maybeSingle();

    if (data) {
      el.textContent = `✓ Code valide — Parrain : ${data.username}`;
      el.className = 'ref-hint ok';
      inp.className = 'inp ok';
      S.refOk = true;
      S.pendingRefId = data.id;
    } else {
      el.textContent = '✕ Code invalide';
      el.className = 'ref-hint err';
      inp.className = 'inp err';
      S.refOk = false;
    }
  }, 600);
}

/* ── LOGIN ── */
async function doLogin() {
  const email = v('lMail').trim();
  const pwd   = v('lPwd');
  if (!email || !pwd) return toast('Remplis tous les champs', 'e', '⚠️');

  setBusy('loginBtn', true, 'Connexion…');
  const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
  setBusy('loginBtn', false, 'Entrer dans le Spot');

  if (error) {
    document.getElementById('loginErr').classList.add('show');
    return;
  }
  document.getElementById('loginErr').classList.remove('show');
  S.user = data.user;
  await loadDashboard();
}

/* ── REGISTER ── */
async function doRegister() {
  const pseudo = v('rPseudo').trim();
  const email  = v('rMail').trim();
  const pwd    = v('rPwd');
  const errEl  = document.getElementById('regErr');

  errEl.classList.remove('show');

  if (!pseudo || !email || !pwd) {
    errEl.textContent = 'Remplis tous les champs.';
    return errEl.classList.add('show');
  }
  if (!S.pseudoOk) {
    errEl.textContent = 'Choisis un pseudo valide et disponible.';
    return errEl.classList.add('show');
  }
  if (pwd.length < 6) {
    errEl.textContent = 'Mot de passe trop court (min. 6 caractères).';
    return errEl.classList.add('show');
  }
  if (!S.refOk) {
    errEl.textContent = 'Un code parrain valide est requis pour rejoindre.';
    return errEl.classList.add('show');
  }

  S.pendingEmail  = email;
  S.pendingPseudo = pseudo;

  setBusy('regBtn', true, 'Création…');
  const { error } = await db.auth.signUp({
    email,
    password: pwd,
    options: { data: { username: pseudo, pseudo } }
  });
  setBusy('regBtn', false, 'Rejoindre l\'Élite');

  if (error && !error.message.toLowerCase().includes('already')) {
    errEl.textContent = error.message;
    return errEl.classList.add('show');
  }

  // Show OTP screen
  document.getElementById('otpEmailDisplay').textContent = email;
  showScreen('sOtp');
  setupOtp();
  toast('Code envoyé à ' + email, 's', '📧');
}

/* ── OTP ── */
function setupOtp() {
  const boxes = document.querySelectorAll('.otp-digit');
  boxes.forEach((b, i) => {
    b.value = '';
    b.className = 'otp-digit';
    b.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g, '');
      b.value = val;
      if (val) {
        b.classList.add('filled');
        if (i < boxes.length - 1) boxes[i + 1].focus();
        else verifyOtp();
      } else {
        b.classList.remove('filled');
      }
    });
    b.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !b.value && i > 0) {
        boxes[i - 1].focus();
        boxes[i - 1].classList.remove('filled');
      }
    });
    b.addEventListener('paste', e => {
      e.preventDefault();
      const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      [...txt.slice(0, 6)].forEach((c, j) => {
        if (boxes[j]) { boxes[j].value = c; boxes[j].classList.add('filled'); }
      });
      boxes[Math.min(txt.length, 5)].focus();
    });
  });
  setTimeout(() => boxes[0].focus(), 300);
}

async function verifyOtp() {
  const boxes = document.querySelectorAll('.otp-digit');
  const otp = [...boxes].map(b => b.value).join('');
  if (otp.length < 6) return toast('Entre les 6 chiffres', 'e', '⚠️');

  const errEl = document.getElementById('otpErr');
  setBusy('otpBtn', true, 'Vérification…');

  const { data, error } = await db.auth.verifyOtp({
    email: S.pendingEmail,
    token: otp,
    type: 'signup'
  });

  setBusy('otpBtn', false, 'Confirmer');

  if (error) {
    errEl.classList.add('show');
    boxes.forEach(b => b.classList.add('shake'));
    setTimeout(() => boxes.forEach(b => b.classList.remove('shake')), 500);
    return;
  }

  errEl.classList.remove('show');
  S.user = data.user;

  // Update profile with pseudo + referral
  if (S.pendingPseudo) {
    await db.from('profiles').update({
      username: S.pendingPseudo,
      referred_by: S.pendingRefId || null,
    }).eq('id', S.user.id);

    // Reward referrer
    if (S.pendingRefId) {
      const { data: ref } = await db.from('profiles')
        .select('gems_count, gems, is_founder, referral_count')
        .eq('id', S.pendingRefId)
        .single();
      if (ref) {
        const bonus = ref.is_founder ? 15 : 5;
        await db.from('profiles').update({
          gems_count: (ref.gems_count || 0) + bonus,
          gems: (ref.gems || 0) + bonus,
          referral_count: (ref.referral_count || 0) + 1,
        }).eq('id', S.pendingRefId);
      }
    }
  }

  toast('Compte créé ! Bienvenue 🎉', 'g', '💎');
  await loadDashboard();
}

async function resendOtp() {
  if (!S.pendingEmail) return;
  await db.auth.resend({ type: 'signup', email: S.pendingEmail });
  toast('Code renvoyé !', 's', '📧');
}

/* ── DASHBOARD ── */
async function loadDashboard() {
  showScreen('sDash');
  await loadProfile();
  await loadLaunchStatus();
  await loadFounderCount();
  startTimer();
}

async function loadProfile() {
  if (!S.user) return;
  const { data } = await db.from('profiles')
    .select('*')
    .eq('id', S.user.id)
    .single();

  if (data) {
    S.profile = data;
    S.isFounder = data.is_founder || false;
    document.getElementById('dashPseudo').textContent = data.username || S.user.email?.split('@')[0] || '—';

    // Role badge
    const badge = document.getElementById('roleBadge');
    const roleTxt = document.getElementById('roleTxt');
    const riderNumEl = document.getElementById('riderNum');

    if (S.isFounder) {
      badge.className = 'role-badge founder';
      roleTxt.textContent = 'FOUNDER ELITE';
      riderNumEl.className = 'rider-number founder-num';
      document.getElementById('earlyAccessBadge').classList.remove('hide');
      document.getElementById('copyRefBtn').classList.remove('hide');
    } else {
      badge.className = 'role-badge rider';
      roleTxt.textContent = 'RIDER';
      riderNumEl.className = 'rider-number rider-num';
    }
  }
}

async function loadLaunchStatus() {
  // Try RPC first
  try {
    const { data, error } = await db.rpc('get_user_launch_status', { p_user_id: S.user.id });
    if (!error && data) {
      S.rank = data.rank || data.user_rank;
      S.launchDate = data.launch_date ? new Date(data.launch_date) : getDefaultLaunch(S.rank);
      document.getElementById('riderNum').textContent = `N° ${S.rank}`;
      return;
    }
  } catch (e) {}

  // Fallback: compute rank manually
  const { data: allProfiles } = await db.from('profiles')
    .select('id, created_at')
    .order('created_at', { ascending: true });

  if (allProfiles) {
    const idx = allProfiles.findIndex(p => p.id === S.user.id);
    S.rank = idx >= 0 ? idx + 1 : allProfiles.length + 1;
    document.getElementById('riderNum').textContent = `N° ${S.rank}`;
  } else {
    S.rank = 999;
    document.getElementById('riderNum').textContent = 'N° ???';
  }

  S.launchDate = getDefaultLaunch(S.rank);
}

function getDefaultLaunch(rank) {
  // Base launch date
  const base = new Date('2025-06-01T12:00:00Z');
  // Wave 2+ adds 7 days
  if (rank > 50) {
    base.setDate(base.getDate() + 7);
    document.getElementById('waveNote').textContent = '⚠ Vague 2 — +7j par rapport à la Wave 1';
    document.getElementById('waveNote').className = 'wave-note warn';
  } else {
    document.getElementById('waveNote').textContent = '★ Wave 1 — Accès Founder prioritaire';
    document.getElementById('waveNote').className = 'wave-note';
    document.getElementById('waveNote').style.color = 'rgba(0,255,163,.5)';
  }
  return base;
}

async function loadFounderCount() {
  const { count } = await db.from('profiles')
    .select('*', { count: 'exact', head: true })
    .eq('is_founder', true);

  S.founderCount = count || 0;
  const total = 50;
  const pct = Math.min(100, Math.round((S.founderCount / total) * 100));
  const left = Math.max(0, total - S.founderCount);

  document.getElementById('progCount').textContent = `${S.founderCount} / ${total}`;
  document.getElementById('progLeft').textContent = `${left} place${left > 1 ? 's' : ''} restante${left > 1 ? 's' : ''}`;
  document.getElementById('progPct').textContent = `${pct}%`;

  // Animate the bar
  setTimeout(() => {
    document.getElementById('progFill').style.width = `${pct}%`;
  }, 300);

  if (left <= 5) {
    document.getElementById('progLeft').style.color = 'var(--red)';
  }
}

/* ── TIMER ── */
function startTimer() {
  if (S.timerInterval) clearInterval(S.timerInterval);
  if (!S.launchDate) S.launchDate = getDefaultLaunch(S.rank || 999);

  const tick = () => {
    const now  = Date.now();
    const diff = S.launchDate.getTime() - now;

    if (diff <= 0) {
      clearInterval(S.timerInterval);
      ['tD','tH','tM','tS'].forEach(id => setTimer(id, '00'));
      document.getElementById('timerTitle').textContent = '🚀 THE SPOT EST LANCÉ';
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    setTimer('tD', pad(d));
    setTimer('tH', pad(h));
    setTimer('tM', pad(m));
    setTimer('tS', pad(s), true); // animate every second
  };

  tick();
  S.timerInterval = setInterval(tick, 1000);
}

let prevS = -1;
function setTimer(elId, val, animate = false) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (el.textContent === val) return;
  el.textContent = val;
  if (animate) {
    el.classList.remove('tick');
    void el.offsetWidth; // reflow
    el.classList.add('tick');
  }
}

function pad(n) { return String(n).padStart(2, '0'); }

/* ── SHARE ── */
function shareRank() {
  const rank = S.rank || '???';
  const isF  = S.isFounder;
  const txt  = isF
    ? `Je suis le Rider N°${rank} sur The Spot — FOUNDER ELITE 🏆\nAccès anticipé débloqué. On se voit sur le terrain. 🤙`

function copyRef() {
  const code = S.profile?.referral_code;

}

async function doLogout() {

  await db.auth.signOut();

/* ── TOAST ── */
function toast(msg, type = 'd', icon = 'ℹ️') {
  const w = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type === 's' ? 's' : type === 'e' ? 'e' : type === 'g' ? 'g' : ''}`;
  t.innerHTML = `<span>${icon}</span><span>${esc(msg)}</span>`;
  w.appendChild(t);
  const dur = type === 'g' ? 3500 : type === 'e' ? 3000 : 2400;
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 350); }, dur);
  if (navigator.vibrate) navigator.vibrate(type === 'e' ? [30, 15, 30] : 20);
}

/* ── UTILS ── */
const v   = id => document.getElementById(id)?.value || '';
const esc = s  => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setBusy(btnId, busy, label) {
  const el = document.getElementById(btnId);
  if (!el) return;
  el.disabled = busy;
  el.innerHTML = busy
    ? `<div class="spinner"></div>`
    : label;
}
