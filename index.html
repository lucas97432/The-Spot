<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#050505"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>THE SPOT — Pre-Launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050505;--em:#00FFA3;--em2:#00CC82;--em3:#00FF6A;
  --gold:#FFD700;--gold2:#FFA500;--gold3:#FFE55C;
  --text:#F0F0F0;--text2:#888;--text3:#3A3A3A;--text4:#555;
  --red:#FF4455;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;overscroll-behavior:none;}
::-webkit-scrollbar{display:none;}
button,input{font-family:'DM Sans',sans-serif;outline:none;border:none;}

body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.55;mix-blend-mode:overlay;}

#mapBg{position:fixed;inset:0;z-index:0;overflow:hidden;background:radial-gradient(ellipse 140% 90% at 50% 60%,#0C1E15 0%,#050505 65%);}
#mapBg .grid{position:absolute;inset:-20%;background-image:linear-gradient(rgba(0,255,163,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,163,.025) 1px,transparent 1px);background-size:55px 55px;animation:gridDrift 35s linear infinite;}
#mapBg .glow{position:absolute;inset:0;background:radial-gradient(circle 350px at 15% 25%,rgba(0,255,163,.05) 0%,transparent 70%),radial-gradient(circle 450px at 85% 75%,rgba(255,215,0,.035) 0%,transparent 70%);animation:ambientPulse 9s ease-in-out infinite alternate;}
@keyframes gridDrift{to{transform:translate(55px,55px);}}
@keyframes ambientPulse{from{opacity:.5;}to{opacity:1;}}
.dot{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--em);box-shadow:0 0 6px var(--em),0 0 18px rgba(0,255,163,.25);animation:dotP 3.5s ease-in-out infinite;}
.dot::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(0,255,163,.2);animation:dotR 3.5s ease-in-out infinite;}
@keyframes dotP{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.6;}}
@keyframes dotR{0%{transform:scale(1);opacity:.5;}100%{transform:scale(3);opacity:0;}}

#root{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* SCREENS — scroll activé, padding généreux en bas pour que le bouton soit toujours visible */
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:calc(var(--st) + 14px) 18px calc(var(--sb) + 40px);
  opacity:0;pointer-events:none;
  transition:opacity .45s ease,transform .45s cubic-bezier(.25,.46,.45,.94);
  transform:translateY(24px);
}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.screen.exit{opacity:0;transform:translateY(-28px);}

/* LOGO — compact */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:14px;}
.logo-img{
  width:54px;height:54px;border-radius:16px;
  background:linear-gradient(135deg,#1a2a1e,#0d1a10);
  border:1px solid rgba(0,255,163,.12);
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 10px 28px rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--em);
  animation:logoPop .7s cubic-bezier(.34,1.56,.64,1);overflow:hidden;
}
.logo-img img{width:100%;height:100%;object-fit:contain;}
@keyframes logoPop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.logo-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  background:linear-gradient(135deg,#fff 0%,#777 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.35em;text-transform:uppercase;color:var(--text3);}

/* CARD */
.card{
  width:100%;max-width:400px;
  background:rgba(8,8,8,.9);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,.055);
  border-radius:22px;padding:20px 18px 22px;
  box-shadow:0 0 0 1px rgba(255,255,255,.015),0 32px 80px rgba(0,0,0,.85);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,.035);border-radius:12px;padding:3px;gap:3px;margin-bottom:18px;}
.tab{flex:1;padding:9px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text4);background:transparent;cursor:pointer;transition:all .22s;border:none;}
.tab.on{background:rgba(255,255,255,.065);color:var(--text);}

/* FIELDS — compact */
.field{margin-bottom:10px;position:relative;}
.lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--text4);margin-bottom:5px;}
.lbl .req{color:var(--em);font-size:7px;margin-left:4px;}
.inp{
  width:100%;background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.065);
  border-radius:12px;padding:11px 14px;
  color:var(--text);font-size:15px;
  transition:border-color .2s,box-shadow .2s,background .2s;-webkit-appearance:none;
}
.inp:focus{border-color:rgba(0,255,163,.3);box-shadow:0 0 0 3px rgba(0,255,163,.055);background:rgba(0,255,163,.02);}
.inp::placeholder{color:var(--text3);}
.inp.err{border-color:rgba(255,68,85,.35);box-shadow:0 0 0 3px rgba(255,68,85,.055);}
.inp.ok{border-color:rgba(0,255,163,.35);}
.inp.loading{border-color:rgba(255,255,255,.1);}
.inp-wrap{position:relative;}
.inp-wrap .inp{padding-right:44px;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--text4);cursor:pointer;padding:4px;transition:color .2s;line-height:1;}
.eye:hover{color:var(--text2);}

.hint{font-family:'JetBrains Mono',monospace;font-size:9px;margin-top:4px;min-height:13px;transition:all .2s;}
.hint.ok{color:var(--em);}
.hint.err{color:var(--red);}
.hint.loading{color:var(--text4);}

/* BUTTONS */
.btn-em{
  width:100%;padding:14px;border:none;border-radius:13px;
  background:linear-gradient(135deg,#00CC82,#00FFA3,#00FF6A);
  background-size:220% 220%;animation:shimmer 3s ease infinite;
  color:#050505;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  cursor:pointer;transition:transform .12s,opacity .2s;
  box-shadow:0 4px 20px rgba(0,255,163,.22),0 0 0 1px rgba(0,255,163,.12);
  margin-top:12px;
}
.btn-em:active{transform:scale(.96);}
.btn-em:disabled{opacity:.38;cursor:not-allowed;transform:none !important;}
@keyframes shimmer{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

.btn-gold{width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(135deg,#A0680A,#FFD700,#FFE55C);background-size:220% 220%;animation:shimmer 3s ease infinite;color:#050505;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;transition:transform .12s;box-shadow:0 4px 20px rgba(255,215,0,.2);}
.btn-gold:active{transform:scale(.96);}
.btn-ghost{width:100%;padding:12px;border:1.5px solid rgba(255,255,255,.07);border-radius:13px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:rgba(255,255,255,.13);color:var(--text);}
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:13px;border:1.5px solid rgba(0,255,163,.18);background:rgba(0,255,163,.04);color:var(--em);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-share:hover{background:rgba(0,255,163,.09);}
.btn-share:active{transform:scale(.97);}

/* OTP */
.otp-hint{text-align:center;font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.otp-hint strong{color:var(--em);}
.otp-row{display:flex;gap:7px;justify-content:center;margin:6px 0 10px;}
.otp-d{width:44px;height:52px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:12px;text-align:center;font-size:22px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;transition:all .18s;caret-color:var(--em);-webkit-appearance:none;}
.otp-d:focus{border-color:rgba(0,255,163,.45);box-shadow:0 0 0 3px rgba(0,255,163,.07);background:rgba(0,255,163,.03);}
.otp-d.filled{border-color:rgba(0,255,163,.28);color:var(--em);}
.otp-d.shake{animation:shake .35s cubic-bezier(.36,.07,.19,.97);}
@keyframes shake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-4px);}40%,60%{transform:translateX(4px);}}

.div{display:flex;align-items:center;gap:10px;margin:12px 0;}
.div-line{flex:1;height:1px;background:rgba(255,255,255,.045);}
.div-txt{font-size:10px;color:var(--text3);}

/* DASHBOARD */
#sDash{justify-content:flex-start;padding-top:calc(var(--st) + 14px);}
.dh{width:100%;max-width:400px;display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:14px;}
.dh-greet{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.14em;color:var(--text4);}
.dh-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-top:1px;}
.dh-logo{width:36px;height:36px;border-radius:10px;border:1px solid rgba(0,255,163,.1);background:linear-gradient(135deg,#1a2a1e,#0d1a10);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--em);overflow:hidden;}
.dh-logo img{width:100%;height:100%;object-fit:contain;}

.rbw{width:100%;max-width:400px;display:flex;justify-content:center;margin-bottom:12px;}
.rb{display:inline-flex;align-items:center;gap:7px;padding:6px 16px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.rb.founder{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22);color:var(--gold);animation:fGlow 2.5s ease-in-out infinite;}
.rb.rider{background:rgba(0,255,163,.05);border:1px solid rgba(0,255,163,.18);color:var(--em);}
.rb-dot{width:6px;height:6px;border-radius:50%;animation:dotP 2s ease-in-out infinite;}
.rb.founder .rb-dot{background:var(--gold);}
.rb.rider .rb-dot{background:var(--em);}
@keyframes fGlow{0%,100%{box-shadow:0 0 18px rgba(255,215,0,.08);}50%{box-shadow:0 0 36px rgba(255,215,0,.2),0 0 70px rgba(255,215,0,.07);}}

.rblock{width:100%;max-width:400px;text-align:center;margin-bottom:14px;}
.rlabel{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.35em;text-transform:uppercase;color:var(--text4);margin-bottom:2px;}
.rnum{font-family:'Syne',sans-serif;font-size:66px;font-weight:800;line-height:1;letter-spacing:-.02em;animation:rReveal .7s cubic-bezier(.25,.46,.45,.94);}
.rnum.fn{background:linear-gradient(135deg,#A07000 0%,#FFD700 40%,#FFE55C 70%,#FFD700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(255,215,0,.28));}
.rnum.rn{background:linear-gradient(135deg,#00CC82 0%,#00FFA3 50%,#00FF6A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(0,255,163,.22));}
@keyframes rReveal{from{opacity:0;transform:scale(1.25);filter:blur(14px);}to{opacity:1;transform:scale(1);filter:none;}}
.ea-badge{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.18);border-radius:100px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2);}

.tc{width:100%;max-width:400px;background:rgba(8,8,8,.72);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.055);border-radius:18px;padding:15px 12px 13px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden;}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,163,.18),transparent);}
.tc-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--text4);margin-bottom:10px;}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.tu{display:flex;flex-direction:column;align-items:center;gap:3px;}
.tv{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;color:var(--text);background:rgba(255,255,255,.035);border-radius:10px;padding:7px 4px;width:100%;text-align:center;transition:transform .12s;}
.tv.tick{animation:tTick .18s ease;}
@keyframes tTick{0%{transform:translateY(-4px);opacity:.5;}100%{transform:translateY(0);opacity:1;}}
.tl{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);}
.wnote{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.05em;color:var(--text4);}
.wnote.wave2{color:rgba(255,165,0,.65);}
.wnote.wave1{color:rgba(0,255,163,.45);}

.pc{width:100%;max-width:400px;background:rgba(8,8,8,.72);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.055);border-radius:18px;padding:14px 16px;margin-bottom:12px;}
.pc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.pc-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--text4);}
.pc-cnt{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--gold);}
.pc-track{height:5px;background:rgba(255,255,255,.045);border-radius:100px;overflow:hidden;margin-bottom:6px;}
.pc-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold3));transition:width 1.6s cubic-bezier(.25,.46,.45,.94);position:relative;}
.pc-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:10px;border-radius:100px;background:rgba(255,255,255,.55);animation:pGlow 1.5s ease-in-out infinite alternate;}
@keyframes pGlow{from{opacity:.3;}to{opacity:1;box-shadow:0 0 8px var(--gold3);}}
.pc-sub{font-size:10px;color:var(--text4);display:flex;justify-content:space-between;}
.pc-sub span{font-family:'JetBrains Mono',monospace;font-size:9px;}
.pc-sub .urg{color:var(--red);font-weight:700;}

.dact{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.dfooter{width:100%;max-width:400px;display:flex;justify-content:center;padding-bottom:4px;}
.logout{background:none;border:none;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text4);cursor:pointer;padding:10px 20px;border-radius:100px;transition:color .2s;}
.logout:hover{color:var(--red);}

.err-msg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--red);margin-top:6px;display:none;background:rgba(255,68,85,.06);border:1px solid rgba(255,68,85,.14);border-radius:8px;padding:7px 11px;line-height:1.5;}
.err-msg.show{display:block;}

.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text4);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;padding:8px 0;margin-bottom:6px;align-self:flex-start;width:100%;max-width:400px;transition:color .2s;}
.back-btn:hover{color:var(--text);}

#toasts{position:fixed;top:calc(var(--st) + 14px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:9990;pointer-events:none;}
.toast{display:flex;align-items:center;gap:8px;background:rgba(8,8,8,.96);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.055);border-radius:100px;padding:9px 18px;font-family:'JetBrains Mono',monospace;font-size:10.5px;max-width:90vw;box-shadow:0 10px 36px rgba(0,0,0,.75);animation:tIn .38s cubic-bezier(.34,1.56,.64,1);pointer-events:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toast.s{border-color:rgba(0,255,163,.22);}
.toast.e{border-color:rgba(255,68,85,.22);}
.toast.g{border-color:rgba(255,215,0,.28);}
.toast.out{animation:tOut .28s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateY(-14px) scale(.8);}to{opacity:1;transform:none;}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px) scale(.88);}}

.spin{width:18px;height:18px;border-radius:50%;border:2px solid rgba(5,5,5,.3);border-top-color:#050505;animation:spinning .55s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spinning{to{transform:rotate(360deg);}}

#loadingOverlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s ease;}
#loadingOverlay.fade{opacity:0;pointer-events:none;}
.lo-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#1a2a1e,#0d1a10);border:1px solid rgba(0,255,163,.1);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--em);animation:logoPop .6s cubic-bezier(.34,1.56,.64,1);}
.lo-dots{display:flex;gap:6px;}
.lo-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:loDot 1.2s ease-in-out infinite;}
.lo-dot:nth-child(2){animation-delay:.18s;}
.lo-dot:nth-child(3){animation-delay:.36s;}
@keyframes loDot{0%,80%,100%{transform:scale(.6);background:var(--text3);}40%{transform:scale(1.2);background:var(--em);}}

.hide{display:none !important;}
</style>
</head>
<body>

<div id="mapBg">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="dot" style="top:18%;left:22%"></div>
  <div class="dot" style="top:42%;left:68%;animation-delay:.9s"></div>
  <div class="dot" style="top:72%;left:38%;animation-delay:1.8s"></div>
  <div class="dot" style="top:28%;left:78%;animation-delay:2.4s"></div>
  <div class="dot" style="top:82%;left:14%;animation-delay:.5s"></div>
  <div class="dot" style="top:12%;left:52%;animation-delay:1.3s"></div>
</div>

<div id="loadingOverlay">
  <div class="lo-logo">TS</div>
  <div class="lo-dots"><div class="lo-dot"></div><div class="lo-dot"></div><div class="lo-dot"></div></div>
</div>

<div id="toasts"></div>

<div id="root">

  <!-- ═══ AUTH SCREEN ═══ -->
  <div class="screen" id="sAuth">
    <div class="logo-wrap">
      <div class="logo-img" id="logoAuth">TS</div>
      <div class="logo-name">The Spot</div>
      <div class="logo-sub">Le territoire ne s'offre pas</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab on" id="tabLoginBtn" onclick="switchTab('login')">Connexion</button>
        <button class="tab"    id="tabRegBtn"   onclick="switchTab('register')">Inscription</button>
      </div>

      <!-- LOGIN -->
      <div id="fLogin">
        <div class="field">
          <label class="lbl">Email</label>
          <input class="inp" type="email" id="lEmail" placeholder="ton@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <div class="field">

        <div class="tu"><div class="tv" id="tD">00</div><div class="tl">Jours</div></div>
        <div class="tu"><div class="tv" id="tH">00</div><div class="tl">Heures</div></div>

</div>

<script>
'use strict';
const SURL='https://pjxxubimwzvvfkvjxfwl.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqeHh1Ymltd3p2dmZrdmp4ZndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjAwNTMsImV4cCI6MjA5MDg5NjA1M30.l9LLC5AcTX9TQzEQYzCDvqcAO1N9jh_r4YTBRQ13sN0';
const db=supabase.createClient(SURL,SKEY);
const S={user:null,profile:null,rank:null,isFounder:false,launchDate:null,timerInt:null,pendingEmail:null,pendingPseudo:null,pendingRefId:null,pseudoOk:false,refOk:false};
let currentScreen='init';

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await db.auth.getSession();
  if(session?.user){S.user=session.user;await loadDashboard();}
  hideLoading();
  db.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadDashboard();hideLoading();}
    if(event==='SIGNED_OUT'){S.user=null;S.profile=null;}
  });
});

function hideLoading(){
  const lo=document.getElementById('loadingOverlay');
  lo.classList.add('fade');
  setTimeout(()=>lo.style.display='none',550);
  if(currentScreen==='init')goTo('sAuth');
}

function goTo(id){
  if(id===currentScreen)return;
  const prev=currentScreen!=='init'?document.getElementById(currentScreen):null;
  const next=document.getElementById(id);
  if(!next)return;
  if(prev){prev.classList.add('exit');setTimeout(()=>prev.classList.remove('active','exit'),480);}
  setTimeout(()=>{next.classList.add('active');currentScreen=id;},prev?80:0);
  if(!prev)currentScreen=id;
}

function switchTab(t){
  document.getElementById('fLogin').classList.toggle('hide',t!=='login');
  document.getElementById('fReg').classList.toggle('hide',t!=='register');
  document.getElementById('tabLoginBtn').classList.toggle('on',t==='login');
  document.getElementById('tabRegBtn').classList.toggle('on',t==='register');
  hideErr('loginErr');hideErr('regErr');
}

function toggleEye(id,btn){
  const f=document.getElementById(id);
  f.type=f.type==='password'?'text':'password';
  btn.textContent=f.type==='password'?'👁':'🙈';
}

/* PSEUDO CHECK → profiles.username */
let pseudoTimer=null;
function onPseudoInput(val){
  S.pseudoOk=false;
  const inp=document.getElementById('rPseudo');
  const hint=document.getElementById('pseudoHint');
  inp.className='inp';
  if(!val||val.length<3){setHint(hint,val.length>0?'⚠ Min. 3 caractères':'',val.length>0?'err':'');return;}
  if(!/^[a-zA-Z0-9_.-]{3,20}$/.test(val)){setHint(hint,'✕ Lettres, chiffres, _ . - uniquement','err');inp.className='inp err';return;}
  setHint(hint,'⟳ Vérification…','loading');
  clearTimeout(pseudoTimer);
  pseudoTimer=setTimeout(async()=>{
    const{data,error}=await db.from('profiles').select('id').eq('username',val).maybeSingle();
    if(error){setHint(hint,'⚠ Erreur réseau','err');return;}
    if(data){setHint(hint,'✕ Pseudo déjà pris','err');inp.className='inp err';S.pseudoOk=false;}
    else{setHint(hint,'✓ Pseudo disponible','ok');inp.className='inp ok';S.pseudoOk=true;}
  },550);
}

/* REFERRAL CHECK → referrals.code */
let refTimer=null;
function onRefInput(raw){
  const val=raw.toUpperCase().trim();
  document.getElementById('rRef').value=val;
  S.refOk=false;S.pendingRefId=null;
  const inp=document.getElementById('rRef');
  const hint=document.getElementById('refHint');
  if(!val){inp.className='inp';setHint(hint,'','');return;}
  setHint(hint,'⟳ Vérification…','loading');
  inp.className='inp loading';
  clearTimeout(refTimer);
  refTimer=setTimeout(async()=>{
    const{data,error}=await db.from('referrals').select('id,owner_id,code,uses,max_uses').eq('code',val).maybeSingle();
    if(error){
      // fallback: check profiles.referral_code
      const{data:p2,error:e2}=await db.from('profiles').select('id,username,referral_code').eq('referral_code',val).maybeSingle();
      if(e2||!p2){setHint(hint,'✕ Code Inexistant','err');inp.className='inp err';S.refOk=false;}
      else{setHint(hint,`✓ Code valide · ${p2.username}`,'ok');inp.className='inp ok';S.refOk=true;S.pendingRefId=p2.id;}
      return;
    }
    if(!data){setHint(hint,'✕ Code Inexistant','err');inp.className='inp err';S.refOk=false;}
    else if(data.max_uses&&data.uses>=data.max_uses){setHint(hint,'✕ Code épuisé','err');inp.className='inp err';S.refOk=false;}
    else{setHint(hint,'✓ Code valide','ok');inp.className='inp ok';S.refOk=true;S.pendingRefId=data.owner_id||data.id;}
  },550);
}

/* LOGIN */
async function doLogin(){
  const email=g('lEmail').value.trim();const pwd=g('lPwd').value;
  hideErr('loginErr');
  if(!email||!pwd)return showErr('loginErr','Remplis tous les champs.');
  busy('loginBtn',true);
  const{data,error}=await db.auth.signInWithPassword({email,password:pwd});
  busy('loginBtn',false,'Entrer dans le Spot');
  if(error){showErr('loginErr','Email ou mot de passe incorrect.');vibrate([30,15,30]);return;}
  S.user=data.user;await loadDashboard();
}

/* REGISTER */
async function doRegister(){
  const pseudo=g('rPseudo').value.trim();
  const email=g('rEmail').value.trim();
  const pwd=g('rPwd').value;
  const ref=g('rRef').value.trim().toUpperCase();
  hideErr('regErr');
  if(!pseudo||!email||!pwd)return showErr('regErr','Tous les champs sont requis.');
  if(!S.pseudoOk)return showErr('regErr','Choisis un pseudo valide et disponible.');
  if(!validateEmail(email))return showErr('regErr','Adresse email invalide.');
  if(pwd.length<6)return showErr('regErr','Mot de passe trop court (min. 6 caractères).');
  if(!ref)return showErr('regErr','Un code parrainage est requis pour rejoindre The Spot.');
  if(!S.refOk)return showErr('regErr','Code de parrainage invalide. Vérifie et réessaie.');
  S.pendingEmail=email;S.pendingPseudo=pseudo;
  busy('regBtn',true);
  const{data,error}=await db.auth.signUp({email,password:pwd,options:{data:{username:pseudo},emailRedirectTo:window.location.href}});
  busy('regBtn',false,"Rejoindre l'Élite");
  if(error){
    if(error.message?.toLowerCase().includes('already registered'))return showErr('regErr','Email déjà utilisé. Connecte-toi.');
    return showErr('regErr',error.message||"Erreur lors de l'inscription.");
  }
  g('otpEmail').textContent=email;
  goTo('sOtp');setupOtp();
  toast('📧 Code envoyé à '+email,'s');
}

/* OTP */
function setupOtp(){
  const boxes=document.querySelectorAll('.otp-d');
  boxes.forEach((b,i)=>{
    b.value='';b.className='otp-d';
    b.oninput=e=>{
      const v=e.target.value.replace(/\D/g,'');b.value=v.slice(-1);
      if(b.value){b.classList.add('filled');if(i<boxes.length-1)boxes[i+1].focus();else verifyOtp();}
      else b.classList.remove('filled');
    };
    b.onkeydown=e=>{if(e.key==='Backspace'&&!b.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';boxes[i-1].classList.remove('filled');}};
    b.onpaste=e=>{
      e.preventDefault();
      const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
      [...txt.slice(0,6)].forEach((c,j)=>{if(boxes[j]){boxes[j].value=c;boxes[j].classList.add('filled');}});
      boxes[Math.min(txt.length,5)].focus();
      if(txt.length>=6)setTimeout(verifyOtp,200);
    };
  });
  setTimeout(()=>boxes[0].focus(),350);
}

async function verifyOtp(){
  const boxes=document.querySelectorAll('.otp-d');
  const code=[...boxes].map(b=>b.value).join('');
  if(code.length<6)return;
  hideErr('otpErr');busy('otpBtn',true);
  const{data,error}=await db.auth.verifyOtp({email:S.pendingEmail,token:code,type:'signup'});
  busy('otpBtn',false,'Confirmer le code');
  if(error){
    g('otpErr').classList.add('show');
    boxes.forEach(b=>{b.classList.add('shake');setTimeout(()=>b.classList.remove('shake'),400);});
    vibrate([30,15,30]);return;
  }
  g('otpErr').classList.remove('show');S.user=data.user;
  await saveProfile();
  toast('🎉 Bienvenue dans The Spot !','g');
  await loadDashboard();
}

async function saveProfile(){
  if(!S.user||!S.pendingPseudo)return;
  const updates={id:S.user.id,username:S.pendingPseudo,updated_at:new Date().toISOString()};
  if(S.pendingRefId)updates.referred_by=S.pendingRefId;
  await db.from('profiles').upsert(updates);
  if(S.pendingRefId){
    const{data:refRow}=await db.from('referrals').select('id,uses,bonus_gems').eq('owner_id',S.pendingRefId).maybeSingle();
    if(refRow){
      await db.from('referrals').update({uses:(refRow.uses||0)+1}).eq('id',refRow.id);
      const bonus=refRow.bonus_gems||5;
      const{data:rp}=await db.from('profiles').select('gems').eq('id',S.pendingRefId).single();
      if(rp)await db.from('profiles').update({gems:(rp.gems||0)+bonus}).eq('id',S.pendingRefId);
    }else{
      const{data:rp}=await db.from('profiles').select('gems').eq('id',S.pendingRefId).single();
      if(rp)await db.from('profiles').update({gems:(rp.gems||0)+5}).eq('id',S.pendingRefId);
    }
  }
}

async function resendOtp(){
  if(!S.pendingEmail)return toast('⚠ Aucun email en attente','e');
  const{error}=await db.auth.resend({type:'signup',email:S.pendingEmail});
  if(error)return toast('⚠ '+error.message,'e');
  toast('📧 Code renvoyé !','s');
}

/* DASHBOARD */
async function loadDashboard(){
  goTo('sDash');
  await Promise.all([loadProfile(),loadLaunchStatus(),loadFounderCount()]);
  startTimer();
}

async function loadProfile(){
  if(!S.user)return;
  const{data}=await db.from('profiles').select('*').eq('id',S.user.id).single();
  if(!data)return;
  S.profile=data;S.isFounder=data.is_founder||false;
  const name=data.username||data.pseudo||S.user.email?.split('@')[0]||'—';
  g('dashName').textContent=name;
  const badge=g('roleBadge');const roleText=g('roleText');const rNumEl=g('riderNum');
  if(S.isFounder){badge.className='rb founder';roleText.textContent='FOUNDER ELITE';rNumEl.className='rnum fn';g('eaBadge').classList.remove('hide');g('copyRefBtn').classList.remove('hide');}
  else{badge.className='rb rider';roleText.textContent='RIDER';rNumEl.className='rnum rn';}
}

/* LAUNCH STATUS → RPC: get_user_launch_status — timer UNIQUEMENT depuis la DB */
async function loadLaunchStatus(){
  if(!S.user)return;
  try{
    const{data,error}=await db.rpc('get_user_launch_status',{p_user_id:S.user.id});
    if(!error&&data){
      S.rank=data.rank??data.user_rank;
      S.launchDate=data.launch_date?new Date(data.launch_date):null;
      if(S.rank!=null)g('riderNum').textContent=`N° ${S.rank}`;
      setWaveNote(S.rank);return;
    }
  }catch(e){}
  // FALLBACK si RPC pas dispo
  const{data:all}=await db.from('profiles').select('id,created_at').order('created_at',{ascending:true});
  if(all){
    const idx=all.findIndex(p=>p.id===S.user.id);
    S.rank=idx>=0?idx+1:all.length+1;
    g('riderNum').textContent=`N° ${S.rank}`;
    setWaveNote(S.rank);
    toast('⚠ Fonction SQL non configurée — timer indisponible','e');
  }
}

function setWaveNote(rank){
  const el=g('waveNote');if(!rank)return;
  if(rank>50){el.textContent='⚠ Vague 2 — Accès +7 jours après la Wave 1';el.className='wnote wave2';}
  else{el.textContent='★ Wave 1 — Accès Founder Prioritaire';el.className='wnote wave1';}
}

async function loadFounderCount(){
  const{count}=await db.from('profiles').select('*',{count:'exact',head:true}).eq('is_founder',true);
  const total=50;const fc=count||0;const pct=Math.min(100,Math.round((fc/total)*100));const left=Math.max(0,total-fc);
  g('pcCount').textContent=`${fc} / ${total}`;
  g('pcLeft').textContent=`${left} place${left!==1?'s':''} restante${left!==1?'s':''}`;
  g('pcPct').textContent=`${pct}%`;
  setTimeout(()=>{g('pcFill').style.width=`${pct}%`;},400);
  if(left<=5&&left>0){g('pcLeft').style.color='var(--red)';toast(`🔥 Plus que ${left} place${left>1?'s':''} Founder !`,'g');}
  else if(left===0){g('pcLeft').textContent='COMPLET';g('pcLeft').style.color='var(--red)';}
}

function startTimer(){
  if(S.timerInt)clearInterval(S.timerInt);
  if(!S.launchDate){['tD','tH','tM','tS'].forEach(id=>setTVal(id,'--'));g('tcTitle').textContent='En attente des données serveur';return;}
  const tick=()=>{
    const now=Date.now();const diff=S.launchDate.getTime()-now;
    if(diff<=0){clearInterval(S.timerInt);['tD','tH','tM','tS'].forEach(id=>setTVal(id,'00'));g('tcTitle').textContent='🚀 THE SPOT EST LANCÉ !';g('tcTitle').style.color='var(--em)';toast('🚀 The Spot est lancé !','g');return;}
    const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);const m=Math.floor((diff%3600000)/60000);const sc=Math.floor((diff%60000)/1000);
    setTVal('tD',pad(d));setTVal('tH',pad(h));setTVal('tM',pad(m));setTVal('tS',pad(sc),true);
  };
  tick();S.timerInt=setInterval(tick,1000);
}

function setTVal(id,val,animate=false){
  const el=g(id);if(!el||el.textContent===val)return;el.textContent=val;
  if(animate){el.classList.remove('tick');void el.offsetWidth;el.classList.add('tick');}
}

function shareRank(){
  const rank=S.rank||'???';
  const txt=S.isFounder?`Je suis le Rider N°${rank} sur The Spot — FOUNDER ELITE 🏆\nAccès anticipé débloqué. On se voit sur le terrain. 🤙`:`Je suis le Rider N°${rank} sur The Spot.\nOn se voit sur le terrain. 🤙`;
  if(navigator.share)navigator.share({title:'THE SPOT',text:txt,url:window.location.href}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('📋 Texte copié !','s'));
  else toast('Partage non supporté','e');
}

function copyRef(){
  const code=S.profile?.referral_code;
  if(!code)return toast('⚠ Pas de code parrain sur ce compte','e');
  navigator.clipboard?.writeText(`Rejoins The Spot avec mon code : ${code} 💎`).then(()=>toast(`💎 Code copié : ${code}`,'g'));
}

async function doLogout(){
  if(S.timerInt)clearInterval(S.timerInt);
  await db.auth.signOut();
  Object.assign(S,{user:null,profile:null,rank:null,isFounder:false,launchDate:null,timerInt:null});
  switchTab('login');
  ['lEmail','lPwd','rPseudo','rEmail','rPwd','rRef'].forEach(id=>{const el=g(id);if(el)el.value='';});
  ['pseudoHint','refHint'].forEach(id=>setHint(g(id),'',''));
  ['rPseudo','rEmail','rPwd','rRef'].forEach(id=>{const el=g(id);if(el)el.className='inp';});
  S.pseudoOk=false;S.refOk=false;
  goTo('sAuth');toast('👋 À bientôt !','s');
}

function toast(msg,type='d'){
  const w=g('toasts');const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;w.appendChild(t);
  const dur=type==='g'?3600:type==='e'?3200:2600;
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),320);},dur);
  vibrate(type==='e'?[30,15,30]:18);
}

const g=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const validateEmail=e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
const vibrate=v=>{try{navigator.vibrate?.(v);}catch(_){}};
function setHint(el,msg,cls){if(!el)return;el.textContent=msg;el.className='hint'+(cls?' '+cls:'');}
function showErr(id,msg){const el=g(id);if(!el)return;el.textContent=msg;el.classList.add('show');vibrate([25,10,25]);}
function hideErr(id){const el=g(id);if(el){el.textContent='';el.classList.remove('show');}}
function busy(btnId,isBusy,label=''){const el=g(btnId);if(!el)return;el.disabled=isBusy;el.innerHTML=isBusy?'<div class="spin"></div>':label;}
</script>
